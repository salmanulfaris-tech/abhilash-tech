<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salman Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-container">
        <div class="profile-card">
            <div class="profile-img-container">
                <img src="https://avatars.githubusercontent.com/u/161208930?v=4" alt="Salman">
            </div>
            <h1 class="name">Salmanul Faris M S.</h1>
            <p class="tagline">HARDWARE & CHIP-LEVEL TECH</p>
            <p class="sub-text">"Restoring Technology from the Silicon Up."</p>
        </div>

        <div class="buttons">
            <button class="btn">VIEW DIAGNOSTICS</button>
            <button class="btn">INITIATE CONTACT</button>
            <button class="btn">DOWNLOAD RESUME</button>
        </div>

        <h2 class="section-title">TECHNICAL LAB</h2>
        <div class="tech-grid">
            <div class="tech-box">
                <span class="icon">📟</span>
                <h3>Chip-Level Repair</h3>
                <p>Precision component replacement...</p>
            </div>
            <div class="tech-box">
                <span class="icon">🔬</span>
                <h3>Micro-Soldering</h3>
                <p>Expert-level soldering under magnification...</p>
            </div>
        </div>
    </div>
</body>
</html>
