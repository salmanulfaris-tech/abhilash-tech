<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhilash Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <div class="header-bar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="title-text">abhilash@terminal: ~</span>
        </div>
        <div class="content">
            <p class="command">>> whoami</p>
            <p class="response">Hello! I am Abhilash.</p>
            
            <p class="command">>> status</p>
            <p class="response">Building my awesome GitHub portfolio.</p>
            
            <p class="command">>> contact</p>
            <p class="response">Find me on GitHub!</p>
            
            <p class="cursor">_</p>
        </div>
    </div>
</body>
</html>
