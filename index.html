<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhilash - Terminal Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-window">
        <div class="terminal-header">
            <div class="buttons">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="header-title">abhilash@terminal: ~</div>
        </div>
        <div class="terminal-body">
            <p><span class="prompt">>></span> <span class="command">whoami</span></p>
            <p class="response">Hello! I am Abhilash, a passionate developer.</p>
            
            <p><span class="prompt">>></span> <span class="command">skills</span></p>
            <p class="response">HTML, CSS, JavaScript, GitHub.</p>
            
            <p><span class="prompt">>></span> <span class="command">status</span></p>
            <p class="response">Building my awesome GitHub portfolio!</p>

            <p><span class="prompt">>></span> <span class="command">contact</span></p>
            <p class="response">Find me on Instagram or GitHub.</p>
            
            <div class="cursor-line">
                <span class="prompt">>></span>
                <span class="cursor">_</span>
            </div>
        </div>
    </div>
</body>
</html>
